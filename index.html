<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>艦隊決戦 — バトルシップ改</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<style>
:root{
  --ink:#0B1B2B; --panel:#13283C; --panel2:#0F2233; --line:#29455E;
  --sea:#16344E; --sea-hover:#1E4565; --text:#D7E4EF; --dim:#7E97AB;
  --brass:#E0A458; --brass-dim:#6E5A38; --hit:#E2574C; --miss:#9FC4DC;
  --radar:#59C9A5; --steel:#7B97AE; --danger:#B3402F;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{background:var(--ink);color:var(--text);font-family:'Zen Kaku Gothic New',sans-serif;}
body{display:flex;justify-content:center;min-height:100vh;}
.app{width:100%;max-width:560px;padding:12px 12px 40px;}
h1{font-family:'DotGothic16',monospace;font-size:1.3rem;letter-spacing:.14em;color:var(--brass);text-align:center;padding:6px 0 0;}
.sub{font-size:.65rem;color:var(--dim);text-align:center;letter-spacing:.3em;margin-bottom:8px;}

.status{display:flex;gap:8px;margin-bottom:8px;}
.pstat{flex:1;background:var(--panel);border:1px solid var(--line);border-radius:6px;padding:6px 8px;}
.pstat.active{border-color:var(--brass);box-shadow:0 0 0 1px var(--brass);}
.pname{font-size:.72rem;font-weight:700;display:flex;justify-content:space-between;align-items:center;}
.pname .chg{font-family:'DotGothic16',monospace;color:var(--brass);font-size:.78rem;}
.gauge{display:flex;gap:2px;margin-top:4px;}
.seg{flex:1;height:7px;background:var(--panel2);border:1px solid var(--brass-dim);border-radius:1px;}
.seg.on{background:var(--brass);border-color:var(--brass);}
.fleet{display:flex;gap:4px;margin-top:5px;flex-wrap:wrap;}
.fchip{font-size:.58rem;color:var(--dim);border:1px solid var(--line);border-radius:3px;padding:1px 4px;}
.fchip.sunk{color:var(--hit);border-color:var(--hit);text-decoration:line-through;opacity:.85;}

.msg{background:var(--panel2);border-left:3px solid var(--brass);padding:7px 10px;font-size:.84rem;min-height:2.2em;margin-bottom:8px;border-radius:0 4px 4px 0;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.msg b{color:var(--brass);}
.hitword{color:var(--hit);font-weight:700;}

.boardlabel{font-size:.68rem;color:var(--dim);letter-spacing:.18em;margin:8px 0 3px;display:flex;justify-content:space-between;align-items:baseline;}
.boardlabel .note{letter-spacing:0;}
.legend{display:flex;gap:10px;flex-wrap:wrap;font-size:.6rem;color:var(--dim);margin:4px 0 6px;}
.legend .lx{color:var(--hit);font-weight:700;}
.legend .lm{color:var(--miss);}
.legend .li{color:var(--radar);}
.legend .le{color:#6FA0C4;}
.board{display:grid;grid-template-columns:18px 1fr;grid-template-rows:18px 1fr;}
.board.pad-tr{margin-right:20px;}
.board.pad-b{margin-bottom:22px;}
.corner{grid-area:1/1;}
.clabs{grid-area:1/2;display:grid;grid-template-columns:repeat(10,1fr);}
.rlabs{grid-area:2/1;display:grid;grid-template-rows:repeat(10,1fr);}
.clabs div,.rlabs div{display:flex;align-items:center;justify-content:center;font-size:.6rem;color:var(--dim);font-family:'DotGothic16',monospace;}
.sea{grid-area:2/2;position:relative;aspect-ratio:1;background:var(--panel2);border:1px solid var(--line);overflow:visible;}
.layer{position:absolute;inset:0;display:grid;grid-template-columns:repeat(10,1fr);grid-template-rows:repeat(10,1fr);}
.cell{border:1px solid rgba(41,69,94,.85);background:var(--sea);position:relative;}
.cell.clickable{cursor:pointer;}
@media(hover:hover){.cell.clickable:hover{background:var(--sea-hover);}}
.cell.hitbg{background:#46201B;}
.cell.preview{background:#2E5D4C !important;}
.cell.badpreview{background:var(--danger) !important;}
.cell.aoe{outline:2px solid var(--brass);outline-offset:-2px;background:var(--sea-hover);}
.layer.shipsL,.layer.marks,.fxlayer{pointer-events:none;}
.shipov{position:absolute;pointer-events:none;}
.shipov svg{width:100%;height:100%;display:block;}
.shipov.vert{transform:rotate(90deg);transform-origin:0 0;}
.mcell{position:relative;display:flex;align-items:center;justify-content:center;}
.mk-hit{color:var(--hit);font-weight:700;font-size:clamp(.85rem,4.2vw,1.25rem);text-shadow:0 0 5px rgba(0,0,0,.9);font-family:'DotGothic16',monospace;z-index:2;line-height:1;}
.mk-miss{width:34%;height:34%;border-radius:50%;background:var(--miss);opacity:.85;}
.mk-iship{width:40%;height:40%;border:2.5px solid var(--radar);border-radius:50%;box-sizing:border-box;}
.mk-iempty{width:22%;height:22%;border:1.5px solid var(--dim);border-radius:50%;opacity:.55;}
.mk-flame{font-size:clamp(.8rem,4vw,1.2rem);filter:drop-shadow(0 0 4px #FF7A3C);animation:flicker 1.1s ease-in-out infinite alternate;z-index:2;line-height:1;}
@keyframes flicker{from{transform:scale(1)}to{transform:scale(1.15)}}
.mk-ediamond{width:30%;height:30%;border:1.5px solid #6FA0C4;transform:rotate(45deg);opacity:.7;}
.rzone{position:absolute;border:2px dashed var(--radar);background:rgba(89,201,165,.1);pointer-events:none;z-index:1;border-radius:3px;}

/* ---- impact effects ---- */
.fxlayer{position:absolute;inset:0;z-index:4;}
.fxcell{position:absolute;width:10%;height:10%;}
@keyframes boom{0%{transform:scale(.2);opacity:0}10%{opacity:1}55%{transform:scale(1.5);opacity:.95}100%{transform:scale(2.4);opacity:0}}
.fx-boom{position:absolute;inset:8%;border-radius:50%;
  background:radial-gradient(circle,#FFF3C4 0%,#FFB45E 35%,#E2574C 60%,transparent 75%);
  opacity:0;animation:boom .65s ease-out forwards;}
@keyframes splash1{0%{transform:scale(.2);opacity:0}12%{opacity:.95}100%{transform:scale(2.1);opacity:0}}
@keyframes splash2{0%{transform:scale(.1);opacity:0}15%{opacity:.8}100%{transform:scale(1.4);opacity:0}}
.fx-splash{position:absolute;inset:16%;border-radius:50%;border:2px solid #CFE9FA;opacity:0;animation:splash1 .7s ease-out forwards;}
.fx-splash2{position:absolute;inset:28%;border-radius:50%;background:radial-gradient(circle,#CFE9FA 0%,transparent 65%);opacity:0;animation:splash2 .55s ease-out forwards;}
@keyframes shake{0%,100%{transform:translate(0,0)}20%{transform:translate(-4px,2px)}40%{transform:translate(4px,-2px)}60%{transform:translate(-3px,-2px)}80%{transform:translate(3px,2px)}}
.sea.shake{animation:shake .45s linear;animation-delay:var(--shd,0ms);}
@keyframes bannerpop{0%{transform:scale(.4);opacity:0}18%{transform:scale(1.15);opacity:1}30%{transform:scale(1)}80%{opacity:1}100%{opacity:0}}
.banner{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:6;pointer-events:none;
  font-family:'DotGothic16',monospace;font-size:clamp(1.3rem,6.5vw,2rem);color:#FFD27A;
  text-shadow:0 0 14px var(--hit),0 0 30px var(--hit);opacity:0;animation:bannerpop 1.4s ease-out forwards;}

/* ---- projectile effects ---- */
@keyframes mfly{from{transform:translateY(var(--md));opacity:1}96%{opacity:1}to{transform:translateY(0);opacity:0}}
.fx-missile{position:absolute;width:10%;height:10%;}
.fx-missile svg{position:absolute;left:30%;top:0;width:40%;height:100%;opacity:0;animation:mfly .38s ease-in forwards;}
@keyframes pfly{0%{transform:translateX(0);opacity:0}4%{opacity:1}96%{opacity:1}100%{transform:translateX(1000%);opacity:0}}
.fx-plane{position:absolute;left:-14%;width:14%;height:10%;opacity:0;animation:pfly 1.1s linear forwards;}
.fx-plane svg{width:100%;height:100%;}
@keyframes tfly{0%{transform:translate3d(0,0,0);opacity:0}6%{opacity:1}94%{opacity:1}100%{transform:translate3d(var(--tx),var(--ty),0);opacity:0}}
.fx-torp{position:absolute;width:10%;height:10%;opacity:0;animation:tfly linear forwards;animation-duration:var(--tdur);}
.fx-torp .tb{position:absolute;left:39%;top:14%;width:22%;height:72%;border-radius:999px;background:linear-gradient(#DCEBF7,#9FC4DC);box-shadow:0 0 8px rgba(207,233,250,.8);}
.fx-torp.h .tb{left:14%;top:39%;width:72%;height:22%;}
@keyframes rpulse{0%{opacity:0;transform:scale(.35)}35%{opacity:.9}100%{opacity:0;transform:scale(1.06)}}
.fx-radar{position:absolute;width:30%;height:30%;border:2px solid var(--radar);opacity:0;animation:rpulse .9s ease-out forwards;}
@media(prefers-reduced-motion:reduce){
  .fx-boom,.fx-splash,.fx-splash2,.banner,.fx-missile svg,.fx-plane,.fx-torp,.fx-radar{animation-duration:.01s !important;animation-delay:0s !important;}
  .sea.shake,.mk-flame{animation:none;}
}

/* ---- torpedo arrows ---- */
.tarrow{display:flex;align-items:center;justify-content:center;background:var(--panel);border:1px solid var(--brass-dim);color:var(--brass);cursor:pointer;font-size:.7rem;border-radius:2px;font-family:inherit;padding:0;}
.tarrow:hover{background:var(--brass);color:var(--ink);}
.strip{position:absolute;display:grid;gap:2px;z-index:7;}
.strip.b{top:100%;left:0;width:100%;height:18px;grid-template-columns:repeat(10,1fr);margin-top:3px;}
.strip.r{left:100%;top:0;height:100%;width:18px;grid-template-rows:repeat(10,1fr);margin-left:3px;}

/* ---- specials ---- */
.specials{display:flex;gap:6px;margin:8px 0;flex-wrap:wrap;}
.spbtn{flex:1 1 30%;min-width:96px;background:var(--panel);border:1px solid var(--line);border-radius:6px;padding:6px;cursor:pointer;color:var(--text);text-align:left;font-family:inherit;}
.spbtn .spname{font-size:.72rem;font-weight:700;display:flex;justify-content:space-between;}
.spbtn .spcost{font-family:'DotGothic16',monospace;color:var(--brass);}
.spbtn .spdesc{font-size:.58rem;color:var(--dim);margin-top:2px;}
.spbtn:disabled{opacity:.38;cursor:not-allowed;}
.spbtn.armed{border-color:var(--brass);background:#2A2417;box-shadow:0 0 0 1px var(--brass);}
.spbtn.dead{border-color:var(--hit);}
.spbtn.dead .spname{color:var(--hit);text-decoration:line-through;}

/* ---- buttons ---- */
.btn{display:inline-block;background:var(--brass);color:var(--ink);border:none;border-radius:6px;padding:10px 22px;font-size:.95rem;font-weight:700;cursor:pointer;font-family:inherit;letter-spacing:.05em;}
.btn:disabled{background:var(--brass-dim);cursor:not-allowed;}
.btn.ghost{background:transparent;color:var(--text);border:1px solid var(--line);font-weight:500;}
.btn.small{padding:4px 12px;font-size:.75rem;}
.btn.wide{width:100%;padding:13px;font-size:1.05rem;}
.btnrow{display:flex;gap:8px;margin:8px 0;flex-wrap:wrap;}
.handover{margin-top:14px;}
.centeraction{position:fixed;left:50%;bottom:6vh;transform:translateX(-50%);z-index:20;width:min(420px,86vw);
  box-shadow:0 8px 30px rgba(0,0,0,.5);}
.centeraction .btn{width:100%;padding:16px;font-size:1.1rem;}
.spacer-bottom{height:120px;}

/* ---- placement ---- */
.shipqueue{display:flex;gap:6px;flex-wrap:wrap;margin:8px 0;}
.sq{border:1px solid var(--line);border-radius:4px;padding:3px 8px;font-size:.68rem;color:var(--dim);}
.sq.cur{border-color:var(--brass);color:var(--brass);font-weight:700;}
.sq.done{border-color:var(--radar);color:var(--radar);}

/* ---- overlay ---- */
.overlay{position:fixed;inset:0;background:var(--ink);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;padding:24px;text-align:center;z-index:50;}
.overlay.translucent{background:rgba(11,27,43,.88);}
.ovtitle{font-family:'DotGothic16',monospace;font-size:1.4rem;color:var(--brass);letter-spacing:.12em;}
.ovtext{font-size:.95rem;max-width:380px;line-height:1.8;}
.ovtext small{color:var(--dim);font-size:.75rem;display:block;margin-top:10px;line-height:1.7;}
.sweep{width:110px;height:110px;border-radius:50%;border:1px solid var(--line);position:relative;overflow:hidden;background:radial-gradient(circle,#10293E 0%,var(--ink) 75%);}
.sweep::before{content:"";position:absolute;inset:0;background:conic-gradient(from 0deg,rgba(89,201,165,.55),transparent 70deg);animation:spin 2.6s linear infinite;}
.sweep::after{content:"";position:absolute;inset:46%;border-radius:50%;background:var(--radar);}
@keyframes spin{to{transform:rotate(360deg)}}
@media(prefers-reduced-motion:reduce){.sweep::before{animation:none;}}
.rules{font-size:.73rem;color:var(--dim);text-align:left;max-width:390px;line-height:1.9;}
.rules b{color:var(--brass);}
/* ---- online ---- */
.txtin{background:var(--panel2);border:1px solid var(--line);border-radius:6px;color:var(--text);padding:10px 12px;font-size:.95rem;width:250px;text-align:center;font-family:inherit;}
.txtin:focus{outline:none;border-color:var(--brass);}
.codebig{font-family:'DotGothic16',monospace;font-size:2.1rem;letter-spacing:.32em;color:var(--brass);padding:8px 2px 8px 12px;border:1px dashed var(--brass-dim);border-radius:8px;background:var(--panel2);min-width:250px;text-align:center;user-select:all;}
.neterr{color:var(--hit);font-size:.8rem;min-height:1.2em;max-width:300px;}
.waitwrap{display:flex;flex-direction:column;align-items:center;gap:16px;padding:52px 0;text-align:center;}
.waitwrap .ovtext{max-width:340px;line-height:1.8;font-size:.9rem;}
.waitwrap .ovtext small{color:var(--dim);font-size:.72rem;display:block;margin-top:10px;line-height:1.7;}
</style>
</head>
<body>
<div class="app" id="app"></div>
<script>
"use strict";
const SIZE=10, MAXCHARGE=10, COLS="ABCDEFGHIJ";
const MISSILE_T=380, TORP_T=80, IMPACT_TAIL=700;
const SHIPS=[
  {key:"carrier",   name:"空母",   size:5},
  {key:"battleship",name:"戦艦",   size:4},
  {key:"cruiser",   name:"巡洋艦", size:3},
  {key:"submarine", name:"潜水艦", size:3},
  {key:"destroyer", name:"駆逐艦", size:2},
];
const SPECIALS=[
  {key:"airstrike",ship:0,name:"航空爆撃",cost:8,desc:"3×3の9マスを一斉攻撃"},
  {key:"cross",    ship:1,name:"十字砲火",cost:5,desc:"十字5マスを攻撃"},
  {key:"radar",    ship:2,name:"レーダー索敵",cost:5,desc:"3×3の艦の有無を索敵"},
  {key:"torpedo",  ship:3,name:"魚雷",cost:5,desc:"直線を進み最初の艦に命中。通過マスは着弾記録"},
  {key:"rapid",    ship:4,name:"速射",cost:2,desc:"外し2回まで手番継続の砲撃"},
];
let G=null;
const idx=(r,c)=>r*10+c;
const inB=(r,c)=>r>=0&&r<10&&c>=0&&c<10;
const gainCharge=(p,n)=>{p.charge=Math.min(MAXCHARGE,p.charge+n);};
const esc=s=>s.replace(/[&<>"]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[m]));
function newFx(){return {impacts:[],missiles:[],planes:[],torps:[],radars:[],banners:[],shakeDelay:-1};}

/* ===== オンライン対戦（PeerJS / ロックステップ・信頼ベース） ===== */
let NET=null; // {my:0|1, peer, conn, on, applying, myName, theirName, code, meReady, theirShips, pend}
const netActive=()=>!!(NET&&NET.conn);
const netApplying=()=>!!(NET&&NET.applying);
function netSend(o){if(NET&&NET.conn&&NET.on){try{NET.conn.send(o);}catch(e){}}}
function newCode(){const s="ACDEFGHJKLMNPQRSTUVWXYZ2345679";let c="";for(let i=0;i<4;i++)c+=s[Math.floor(Math.random()*s.length)];return c;}
function readName(defName){
  const el=document.getElementById("nm");
  const v=el?el.value.trim().slice(0,12):"";
  return v||defName;
}
function createRoom(){
  const name=readName("プレイヤー1");
  NET={my:0,peer:null,conn:null,on:false,applying:false,myName:name,theirName:"",code:newCode(),meReady:false,theirShips:null,pend:null};
  G.players[0].name=name;
  G.overlay="nethost";render();
  NET.peer=new Peer("bship24-"+NET.code);
  NET.peer.on("error",e=>netFail("接続エラー："+e.type));
  NET.peer.on("connection",c=>{
    if(NET.conn){c.close();return;}
    NET.conn=c;wireConn();
  });
}
function joinRoom(){
  const codeEl=document.getElementById("jcode");
  const code=(codeEl?codeEl.value:"").trim().toUpperCase();
  if(code.length!==6){netFail("部屋コードは6文字です。");return;}
  const name=readName("プレイヤー2");
  NET={my:1,peer:null,conn:null,on:false,applying:false,myName:name,theirName:"",code,meReady:false,theirShips:null,pend:null};
  G.players[1].name=name;
  G.overlay="netjoin";render();
  NET.peer=new Peer();
  NET.peer.on("error",e=>{
    if(e.type==="peer-unavailable")netFail("部屋が見つかりません。コードを確認してください。");
    else netFail("接続エラー："+e.type);
  });
  NET.peer.on("open",()=>{
    NET.conn=NET.peer.connect("bship24-"+code,{reliable:true});
    wireConn();
  });
}
function wireConn(){
  const c=NET.conn;
  c.on("open",()=>{
    NET.on=true;
    netSend({t:"hello",name:NET.myName});
    G.overlay=null;G.phase="place";G.current=NET.my;G.placeIdx=0;G.dir="h";
    G.msg="艦隊を配置してください。";
    render();
  });
  c.on("data",handleNet);
  c.on("close",()=>{if(G.phase!=="over")netFail("通信が切断されました。");});
  c.on("error",()=>{if(G.phase!=="over")netFail("通信エラーが発生しました。");});
}
function netFail(msg){
  const el=document.getElementById("neterr");
  if(el&&G.overlay==="netsetup"){el.textContent=msg;return;}
  if(NET)NET.on=false;
  G.overlay="netfail";G.failMsg=msg;render();
}
function handleNet(m){
  if(!m||typeof m!=="object")return;
  if(m.t==="hello"){
    NET.theirName=(m.name||"").slice(0,12)||`プレイヤー${NET.my===0?2:1}`;
    G.players[1-NET.my].name=NET.theirName;
    if(!G.overlay&&!netApplying())render();
    return;
  }
  if(m.t==="ships"){
    if(Array.isArray(m.cells)&&m.cells.length===SHIPS.length){NET.theirShips=m.cells;tryStartBattle();}
    return;
  }
  if(m.t==="ev"){applyRemote(m);return;}
  if(m.t==="end"){
    const gained=netHandover();
    const chg=gained?"（交代ボーナス ⚡+1）":"";
    if(G.turnLog.length){G.screen="replay";startReplay(chg);}
    else{G.screen="attack";G.msg=`座標を選んで砲撃してください。${chg}`;render();}
    return;
  }
}
function applyRemote(m){
  NET.applying=true;
  try{
    if(m.fn==="toggle")toggleSpecial(m.key);
    else if(m.fn==="cancel")cancelSpecial();
    else if(m.fn==="cell")clickEnemy(m.i);
    else if(m.fn==="torp")fireTorpedo(m.edge,m.n);
  }finally{NET.applying=false;}
  if(G.phase==="over"){G.screen="replay";startReplay();}
}
function tryStartBattle(){
  if(!(NET.meReady&&NET.theirShips))return false;
  const opp=G.players[1-NET.my];
  NET.theirShips.forEach((cells,si)=>{if(Array.isArray(cells))placeShipAt(opp,si,cells);});
  G.phase="battle";G.current=0;G.turnDone=false;G.mode="normal";G.turnLog=[];
  beginTurn();
  if(NET.my===0){G.screen="attack";G.msg="座標を選んで砲撃してください。";}
  else G.screen="waiting";
  render();
  return true;
}
function netHandover(){
  G.current=1-G.current;G.turnDone=false;G.mode="normal";G.fx=newFx();
  G.rapidActive=false;G.rapidMiss=0;G.rapidFired=false;
  const gained=beginTurn();G.turnBonus=gained;return gained;
}
function netEndTurn(){
  if(G.busy)return;
  netSend({t:"end"});
  netHandover();
  G.turnLog=[];G.screen="waiting";
  render();
}

function mkPlayer(name){
  return {name,
    grid:new Array(100).fill(-1),
    ships:SHIPS.map(s=>({...s,cells:[],hits:0,sunk:false})),
    incoming:new Array(100).fill(0),  // 0未 1外れ 2命中
    intel:new Array(100).fill(0),
    charge:0,hasPlayed:false};
}
function initGame(){
  if(G&&G.timer)clearTimeout(G.timer);
  G={phase:"place",current:0,screen:"attack",
     players:[mkPlayer("プレイヤー1"),mkPlayer("プレイヤー2")],
     placeIdx:0,dir:"h",
     mode:"normal",rapidActive:false,rapidMiss:0,rapidFired:false,turnDone:false,
     busy:false,hideMarks:null,hideIntel:null,hideSunk:null,timer:null,
     turnLog:[],replayRadarZones:[],turnBonus:false,
     overlay:"intro",passTo:0,afterPass:null,
     msg:"艦隊を配置してください。",
     fx:newFx()};
  render();
}

/* ===== 艦イラスト(SVG) ===== */
const PALETTES={
  mine:{hull:"#54718A",deck:"#7B97AE",line:"#B7CFE2",det:"#33495E",op:".95",dash:""},
  mineSunk:{hull:"#3D211D",deck:"#5A2D26",line:"#A85248",det:"#93443A",op:".9",dash:""},
  ghost:{hull:"#2E1714",deck:"#47221D",line:"#E2574C",det:"#7A352C",op:".8",dash:'stroke-dasharray="5 4"'},
};
function shipSVG(ship,variant){
  const L=ship.size*40, c=PALETTES[variant];
  const hull=`<path d="M5 20 Q6 9 22 8 L ${L-18} 8 L ${L-4} 20 L ${L-18} 32 L 22 32 Q6 31 5 20 Z" fill="${c.hull}" stroke="${c.line}" stroke-width="1.5" ${c.dash}/>`;
  let det="";
  switch(ship.key){
    case "carrier":
      det=`<rect x="6" y="8" width="${L-12}" height="24" rx="5" fill="${c.deck}" stroke="${c.line}" stroke-width="1.5" ${c.dash}/>
           <line x1="16" y1="20" x2="${L-16}" y2="20" stroke="${c.det}" stroke-width="2.5" stroke-dasharray="7 6"/>
           <rect x="${L-66}" y="10" width="24" height="7" rx="2" fill="${c.det}" stroke="${c.line}" stroke-width="1"/>`;
      return svgWrap(L,det,c.op);
    case "battleship":
      det=hull+[0.28,0.5,0.74].map(t=>{const x=L*t;
        return `<circle cx="${x}" cy="20" r="5.5" fill="${c.deck}" stroke="${c.line}" stroke-width="1.2"/>
                <line x1="${x}" y1="20" x2="${x+12}" y2="20" stroke="${c.line}" stroke-width="2.5"/>`;}).join("");
      break;
    case "cruiser":
      det=hull+`<circle cx="${L*0.32}" cy="20" r="5" fill="${c.deck}" stroke="${c.line}" stroke-width="1.2"/>
        <line x1="${L*0.32}" y1="20" x2="${L*0.32+11}" y2="20" stroke="${c.line}" stroke-width="2.2"/>
        <rect x="${L*0.55}" y="14" width="${L*0.2}" height="12" rx="2" fill="${c.deck}" stroke="${c.line}" stroke-width="1"/>`;
      break;
    case "submarine":
      det=`<ellipse cx="${L/2}" cy="20" rx="${L/2-6}" ry="10" fill="${c.hull}" stroke="${c.line}" stroke-width="1.5" ${c.dash}/>
           <rect x="${L/2-12}" y="11" width="24" height="9" rx="3" fill="${c.deck}" stroke="${c.line}" stroke-width="1.2"/>
           <line x1="${L/2}" y1="11" x2="${L/2}" y2="4" stroke="${c.line}" stroke-width="2"/>`;
      break;
    case "destroyer":
      det=`<path d="M4 20 Q6 12 20 11 L ${L-16} 11 L ${L-3} 20 L ${L-16} 29 L 20 29 Q6 28 4 20 Z" fill="${c.hull}" stroke="${c.line}" stroke-width="1.5" ${c.dash}/>
           <rect x="${L*0.42}" y="14" width="${L*0.22}" height="12" rx="2" fill="${c.deck}" stroke="${c.line}" stroke-width="1"/>
           <circle cx="${L*0.24}" cy="20" r="4" fill="${c.deck}" stroke="${c.line}" stroke-width="1.1"/>`;
      break;
  }
  return svgWrap(L,det,c.op);
}
function svgWrap(L,inner,op){
  return `<svg viewBox="0 0 ${L} 40" preserveAspectRatio="none" style="opacity:${op}" xmlns="http://www.w3.org/2000/svg">${inner}</svg>`;
}
function shipOverlay(ship,variant){
  if(!ship.cells.length)return "";
  const head=ship.cells[0],r=Math.floor(head/10),c=head%10;
  const horiz=ship.size===1||ship.cells[1]===head+1;
  const st=horiz
    ?`left:${c*10}%;top:${r*10}%;width:${ship.size*10}%;height:10%;`
    :`left:${(c+1)*10}%;top:${r*10}%;width:${ship.size*10}%;height:10%;`;
  return `<div class="shipov${horiz?"":" vert"}" style="${st}">${shipSVG(ship,variant)}</div>`;
}

/* ===== 配置 ===== */
function shipCells(r,c,size,dir){
  const cells=[];
  for(let i=0;i<size;i++){const rr=dir==="h"?r:r+i,cc=dir==="h"?c+i:c;
    if(!inB(rr,cc))return null;cells.push(idx(rr,cc));}
  return cells;
}
function canPlace(p,cells){return !!cells&&cells.every(i=>p.grid[i]===-1);}
function placeShipAt(p,si,cells){cells.forEach(i=>p.grid[i]=si);p.ships[si].cells=cells;}
function clearPlacement(p){p.grid.fill(-1);p.ships.forEach(s=>{s.cells=[];});G.placeIdx=0;}
function randomPlace(p){
  clearPlacement(p);
  for(let si=0;si<SHIPS.length;si++){
    for(let t=0;t<500;t++){
      const dir=Math.random()<.5?"h":"v";
      const cells=shipCells(Math.floor(Math.random()*10),Math.floor(Math.random()*10),SHIPS[si].size,dir);
      if(canPlace(p,cells)){placeShipAt(p,si,cells);break;}
    }
  }
  G.placeIdx=5;
}
function clickPlace(i){
  if(G.placeIdx>=5)return;
  const p=G.players[G.current];
  const cells=shipCells(Math.floor(i/10),i%10,SHIPS[G.placeIdx].size,G.dir);
  if(canPlace(p,cells)){placeShipAt(p,G.placeIdx,cells);G.placeIdx++;render();}
}
function donePlacement(){
  if(netActive()){
    NET.meReady=true;
    netSend({t:"ships",cells:G.players[NET.my].ships.map(s=>s.cells)});
    if(!tryStartBattle()){G.screen="waiting";render();}
    return;
  }
  if(G.current===0){
    goPass(1,()=>{G.current=1;G.placeIdx=0;G.dir="h";G.msg="艦隊を配置してください。";});
  }else{
    goPass(0,()=>{G.current=0;G.phase="battle";G.screen="attack";G.mode="normal";G.turnDone=false;beginTurn();G.msg="座標を選んで砲撃してください。";});
  }
}
function goPass(to,after){G.passTo=to;G.afterPass=after;G.overlay="pass";render();}
/* 手番開始：そのプレイヤーが既に手番を経験済みなら開始時+1（1巡目は対象外） */
function beginTurn(){
  const p=G.players[G.current];
  let gained=false;
  if(p.hasPlayed){gainCharge(p,1);gained=true;}
  p.hasPlayed=true;
  return gained;
}

/* ===== アクション実行（演出＝指定→攻撃→結果の順） ===== */
const allSunk=p=>p.ships.every(s=>s.sunk);
function registerHit(def,i){
  def.incoming[i]=2;
  const ship=def.ships[def.grid[i]];
  ship.hits++;gainCharge(def,1);
  if(ship.hits>=ship.size){ship.sunk=true;return ship.name;}
  return null;
}
/* 結果の表示（マーク・撃沈艦影・メッセージ）をアニメ完了まで遅延させる共通処理 */
function commit({fx,newMarks=[],intelCells=[],sunkIdxs=[],sunkNames=[],radar=null,interim,final,dur,log=true}){
  if(netApplying()){
    // 相手の操作を自クライアントに適用中：演出なしでリプレイ用ログのみ蓄積
    if(log&&(fx.impacts.length||fx.missiles.length||fx.planes.length||fx.torps.length||radar)){
      G.turnLog.push({fx,dur,newMarks,sunkIdxs,sunkNames,radar});
    }
    return;
  }
  if(netActive()&&NET.pend){netSend(NET.pend);NET.pend=null;}
  if(G.timer)clearTimeout(G.timer);
  G.fx=fx;
  G.hideMarks=new Set(newMarks);
  G.hideIntel=new Set(intelCells);
  G.hideSunk=new Set(sunkIdxs);
  G.busy=true;G.msg=interim;
  if(log&&(fx.impacts.length||fx.missiles.length||fx.planes.length||fx.torps.length||radar)){
    G.turnLog.push({fx,dur,newMarks,sunkIdxs,sunkNames,radar});
  }
  render();
  G.timer=setTimeout(()=>{
    G.busy=false;G.hideMarks=null;G.hideIntel=null;G.hideSunk=null;
    G.msg=final;G.fx=newFx();
    render();
  },dur);
}
function startHandover(){
  if(G.busy)return;
  goPass(1-G.current,()=>{
    G.current=1-G.current;G.turnDone=false;G.mode="normal";G.fx=newFx();
    G.rapidActive=false;G.rapidMiss=0;G.rapidFired=false;
    const gained=beginTurn();
    G.turnBonus=gained;
    const chgMsg=gained?"（交代ボーナス ⚡+1）":"";
    if(G.turnLog.length){G.screen="replay";startReplay(chgMsg);}
    else{G.screen="attack";G.msg=`座標を選んで砲撃してください。${chgMsg}`;}
  });
}
/* ===== リプレイ：直前ターンの敵攻撃を自艦隊視点で再生 ===== */
function startReplay(chgMsg=""){
  const fx=newFx();
  const newMarks=[],sunkIdxs=[],radarZones=[];
  let off=400;
  G.turnLog.forEach(e=>{
    e.fx.impacts.forEach(f=>fx.impacts.push({...f,delay:f.delay+off}));
    e.fx.missiles.forEach(f=>fx.missiles.push({...f,delay:f.delay+off}));
    e.fx.planes.forEach(f=>fx.planes.push({...f,delay:f.delay+off}));
    e.fx.torps.forEach(f=>fx.torps.push({...f,delay:f.delay+off}));
    e.fx.radars.forEach(f=>fx.radars.push({...f,delay:f.delay+off}));
    e.newMarks.forEach(i=>newMarks.push(i));
    e.sunkIdxs.forEach(s=>sunkIdxs.push(s));
    e.sunkNames.forEach(n=>{fx.banners.push({text:`${n}が撃沈された…`,delay:off+e.dur-650});});
    if(e.radar)radarZones.push(e.radar);
    if(e.sunkIdxs.length&&fx.shakeDelay<0)fx.shakeDelay=off+e.dur-650;
    off+=e.dur+350;
  });
  G.fx=fx;
  G.replayRadarZones=radarZones;
  G.hideMarks=new Set(newMarks);
  G.hideSunk=new Set(sunkIdxs);
  G.hideIntel=new Set();
  G.busy=true;
  G.msg=G.turnLog.some(e=>e.fx.impacts.length||e.fx.missiles.length||e.fx.torps.length)
    ?"敵の攻撃を受けています…":"敵が索敵を行いました…";
  render();
  G.timer=setTimeout(()=>{
    G.busy=false;G.hideMarks=null;G.hideSunk=null;G.hideIntel=null;G.fx=newFx();
    G.msg=`状況を確認し、攻撃に移ってください。${chgMsg}`;
    render();
  },off+200);
}
function toAttackScreen(){
  if(G.timer)clearTimeout(G.timer);
  G.busy=false;G.hideMarks=null;G.hideSunk=null;G.hideIntel=null;G.fx=newFx();
  G.turnLog=[];G.replayRadarZones=[];G.screen="attack";
  G.msg=`座標を選んで砲撃してください。${G.turnBonus?"（交代ボーナス ⚡+1）":""}`;
  G.turnBonus=false;
  render();
}
function checkOverFlag(def){if(allSunk(def))G.phase="over";}

/* 行動解決後の手番継続を判定。
   hit=この行動が命中(継続条件)を満たすか。
   戻り値: {cont:継続するか, ended速射:速射が今終了したか} と副作用(turnDone, rapidMiss消費) */
function resolveTurn(hit){
  if(G.rapidActive)G.rapidFired=true;
  if(hit){G.turnDone=false;return {cont:true,rapidEnded:false};}
  // 不発
  if(G.rapidActive){
    G.rapidMiss--;
    if(G.rapidMiss<=0){G.rapidActive=false;G.turnDone=true;return {cont:false,rapidEnded:true};}
    G.turnDone=false;return {cont:true,rapidEnded:false};
  }
  G.turnDone=true;return {cont:false,rapidEnded:false};
}
function rapidTail(){return G.rapidActive?`（速射：あと${G.rapidMiss}回まで外せる）`:"";}
function clickEnemy(i){
  if(G.phase!=="battle"||G.turnDone)return;
  if(!netApplying()&&(G.overlay||G.busy||G.screen!=="attack"))return;
  if(netActive()&&!netApplying()){
    if(G.current!==NET.my)return;
    NET.pend={t:"ev",fn:"cell",i};
  }
  const atk=G.players[G.current],def=G.players[1-G.current];
  const m=G.mode;
  if(m==="normal"||m==="rapid"){
    if(def.incoming[i]!==0)return;
    const fx=newFx();fx.missiles.push({i,delay:0});
    const dur=MISSILE_T+IMPACT_TAIL;
    let final,sunkIdxs=[],sunkNames=[];
    if(def.grid[i]>=0){
      const si=def.grid[i];
      const sunk=registerHit(def,i);
      fx.impacts.push({i,kind:"boom",delay:MISSILE_T});
      if(sunk){sunkIdxs=[si];sunkNames=[sunk];
        fx.banners.push({text:`${sunk} 撃沈！`,delay:MISSILE_T+100});fx.shakeDelay=MISSILE_T+100;}
      gainCharge(atk,1);if(sunk)gainCharge(atk,1);
      checkOverFlag(def);
      resolveTurn(true);
      if(G.phase==="over")final="";
      else final=sunk?`<span class="hitword">命中！ ${esc(sunk)}を撃沈！</span>　続けて攻撃できます。${rapidTail()}`
                     :`<span class="hitword">命中！</span>　続けて攻撃できます。${rapidTail()}`;
    }else{
      def.incoming[i]=1;
      fx.impacts.push({i,kind:"splash",delay:MISSILE_T});
      const r=resolveTurn(false);
      if(r.rapidEnded)final="外れ…速射終了 — ターン終了。";
      else if(r.cont)final=`外れ…${rapidTail()}`;
      else final="外れ…ターン終了。";
    }
    commit({fx,newMarks:[i],sunkIdxs,sunkNames,interim:"砲撃！",final,dur});
    return;
  }
  if(m==="radar"){
    atk.charge-=5;G.mode="normal";
    const r=Math.floor(i/10),c=i%10;const cells=[];
    for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++)
      if(inB(r+dr,c+dc)){const j=idx(r+dr,c+dc);atk.intel[j]=def.grid[j]>=0?2:1;cells.push(j);}
    const fx=newFx();fx.radars.push({r,c,delay:0});
    let final="レーダー索敵完了。緑◯＝艦あり、灰点＝艦なし。";
    if(G.rapidActive){
      // 索敵は攻撃命中ではないので速射行動を1消費する扱い
      const rr=resolveTurn(false);
      if(rr.rapidEnded)final+="速射終了 — ターン終了。";
      else final+=`続けて攻撃できます。${rapidTail()}`;
    }else{G.turnDone=true;final+="確認したら交代してください。";}
    commit({fx,intelCells:cells,radar:{r,c},interim:"索敵中…",final,dur:1500});
    return;
  }
  if(m==="airstrike"||m==="cross"){
    const sp=SPECIALS.find(s=>s.key===m);
    atk.charge-=sp.cost;G.mode="normal";
    const r=Math.floor(i/10),c=i%10;const targets=[];
    if(m==="airstrike"){for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++)if(inB(r+dr,c+dc))targets.push(idx(r+dr,c+dc));}
    else [[0,0],[-1,0],[1,0],[0,-1],[0,1]].forEach(([dr,dc])=>{if(inB(r+dr,c+dc))targets.push(idx(r+dr,c+dc));});
    const fx=newFx();
    if(m==="airstrike")fx.planes.push({r,delay:0});
    const base=m==="airstrike"?550:MISSILE_T;
    const step=m==="airstrike"?70:120;
    let hits=0,maxD=0;const sunkNames=[],sunkIdxs=[],newMarks=[];
    targets.forEach((j,k)=>{
      const d=base+k*step;
      if(m==="cross")fx.missiles.push({i:j,delay:k*step});
      if(def.incoming[j]!==0)return;
      newMarks.push(j);maxD=Math.max(maxD,d);
      if(def.grid[j]>=0){
        hits++;const si=def.grid[j];const sn=registerHit(def,j);
        fx.impacts.push({i:j,kind:"boom",delay:d});
        if(sn){sunkNames.push(sn);sunkIdxs.push(si);}
      }else{def.incoming[j]=1;fx.impacts.push({i:j,kind:"splash",delay:d});}
    });
    const dur=Math.max(maxD,base+targets.length*step)+IMPACT_TAIL;
    if(sunkNames.length){fx.banners.push({text:`${sunkNames.join("・")} 撃沈！`,delay:dur-650});fx.shakeDelay=dur-650;}
    checkOverFlag(def);
    let final=`${sp.name}：${hits}発命中`;
    if(sunkNames.length)final+=`！ <span class="hitword">${sunkNames.map(esc).join("・")}を撃沈！</span>`;
    if(G.phase==="over"){G.turnDone=true;final="";}
    else{
      const r=resolveTurn(hits>0);
      if(r.rapidEnded)final+="　速射終了 — ターン終了。";
      else if(r.cont)final+=`　続けて攻撃できます。${rapidTail()}`;
      else final+=" — ターン終了。";
    }
    commit({fx,newMarks,sunkIdxs,sunkNames,interim:m==="airstrike"?"航空隊、発艦！":"全主砲、斉射！",final,dur});
    return;
  }
}
function fireTorpedo(edge,n){
  if(G.mode!=="torpedo"||G.turnDone)return;
  if(!netApplying()&&(G.overlay||G.busy||G.screen!=="attack"))return;
  if(netActive()&&!netApplying()){
    if(G.current!==NET.my)return;
    NET.pend={t:"ev",fn:"torp",edge,n};
  }
  const atk=G.players[G.current],def=G.players[1-G.current];
  atk.charge-=5;G.mode="normal";
  const fx=newFx();
  const path=[];
  if(edge==="t")for(let r=0;r<10;r++)path.push(idx(r,n));
  if(edge==="b")for(let r=9;r>=0;r--)path.push(idx(r,n));
  if(edge==="l")for(let c=0;c<10;c++)path.push(idx(n,c));
  if(edge==="r")for(let c=9;c>=0;c--)path.push(idx(n,c));
  let result="魚雷は命中しなかった…ターン終了。";
  let travel=path.length,didHit=false;const newMarks=[],sunkIdxs=[],sunkNames=[];
  for(let k=0;k<path.length;k++){
    const j=path[k];
    if(def.grid[j]>=0&&def.incoming[j]!==2){
      const si=def.grid[j];const sn=registerHit(def,j);
      newMarks.push(j);didHit=true;
      fx.impacts.push({i:j,kind:"boom",delay:(k+1)*TORP_T});
      travel=k+1;
      if(sn){sunkIdxs.push(si);sunkNames.push(sn);}
      checkOverFlag(def);
      break;
    }
    if(def.incoming[j]===0){def.incoming[j]=1;newMarks.push(j);}
    fx.impacts.push({i:j,kind:"splash",delay:(k+1)*TORP_T});
  }
  if(G.phase==="over"){G.turnDone=true;result="";}
  else{
    const sn=sunkNames[0];
    const r=resolveTurn(didHit);
    if(didHit){
      result=sn?`魚雷命中！ <span class="hitword">${esc(sn)}を撃沈！</span>　続けて攻撃できます。${rapidTail()}`
               :`<span class="hitword">魚雷命中！</span>　続けて攻撃できます。${rapidTail()}`;
    }else if(r.rapidEnded)result="魚雷は不発…速射終了 — ターン終了。";
    else if(r.cont)result=`魚雷は不発…${rapidTail()}`;
    else result="魚雷は命中しなかった…ターン終了。";
  }
  fx.torps.push({edge,n,travel,delay:0});
  const dur=travel*TORP_T+IMPACT_TAIL;
  if(sunkNames.length){fx.banners.push({text:`${sunkNames[0]} 撃沈！`,delay:dur-650});fx.shakeDelay=dur-650;}
  commit({fx,newMarks,sunkIdxs,sunkNames,interim:"魚雷、発射！",final:result,dur});
}
function cancelSpecial(){
  if(!netApplying()&&G.busy)return;
  if(G.mode==="rapid"&&!G.rapidFired){
    // まだ1発も撃っていない速射は取り消してチャージ返却
    if(netActive()&&!netApplying())netSend({t:"ev",fn:"cancel"});
    G.players[G.current].charge=Math.min(MAXCHARGE,G.players[G.current].charge+2);
    G.mode="normal";G.rapidActive=false;G.rapidMiss=0;
    G.msg="速射を解除。チャージを返却しました。";render();return;
  }
  if(G.mode!=="normal"&&G.mode!=="rapid"){
    // 照準中の特殊攻撃を解除（速射中なら速射継続のまま通常砲撃に戻る）
    if(netActive()&&!netApplying())netSend({t:"ev",fn:"cancel"});
    G.mode="normal";
    G.msg=G.rapidActive?`照準解除。速射継続中（あと${G.rapidMiss}回まで外せる）。`:"特殊攻撃を解除。通常砲撃に戻ります。";
    render();
  }
}
function toggleSpecial(key){
  if(G.phase!=="battle"||G.turnDone)return;
  if(!netApplying()&&(G.overlay||G.busy||G.screen!=="attack"))return;
  if(netActive()&&!netApplying()&&G.current!==NET.my)return;
  if(G.mode===key){cancelSpecial();return;}
  const atk=G.players[G.current];
  const sp=SPECIALS.find(s=>s.key===key);
  if(key==="rapid"){
    // 速射の二重起動は不可（既に速射中なら無視）
    if(G.rapidActive)return;
    if(atk.ships[sp.ship].sunk||atk.charge<sp.cost)return;
    if(netActive()&&!netApplying())netSend({t:"ev",fn:"toggle",key});
    atk.charge-=2;G.mode="rapid";G.rapidActive=true;G.rapidMiss=2;G.rapidFired=false;
    G.msg="速射発動：この手番は外し2回まで継続。通常砲撃も特殊攻撃も選べる（各攻撃のコストは別途）。";
  }else{
    if(atk.ships[sp.ship].sunk||atk.charge<sp.cost)return;
    if(netActive()&&!netApplying())netSend({t:"ev",fn:"toggle",key});
    G.mode=key;
    const guide={airstrike:"中心マスを選択（3×3を攻撃）",cross:"中心マスを選択（十字5マスを攻撃）",
                 radar:"中心マスを選択（3×3を索敵）",torpedo:"盤面端の矢印から発射方向を選択"};
    G.msg=`<b>${sp.name}</b> 準備完了 — ${guide[key]}`;
  }
  render();
}

/* ===== ホバープレビュー ===== */
let pvCells=[];
function clearPv(){pvCells.forEach(el=>el.classList.remove("preview","badpreview","aoe"));pvCells=[];}
function hoverPlaceCell(i){
  clearPv();
  if(G.placeIdx>=5)return;
  const p=G.players[G.current];
  const cells=shipCells(Math.floor(i/10),i%10,SHIPS[G.placeIdx].size,G.dir);
  const ok=canPlace(p,cells);
  (cells||[i]).forEach(j=>{
    const el=document.getElementById("oc"+j);
    if(el){el.classList.add(ok?"preview":"badpreview");pvCells.push(el);}
  });
}
function hoverAoeCell(i){
  clearPv();
  if(G.busy)return;
  if(G.mode!=="airstrike"&&G.mode!=="cross"&&G.mode!=="radar")return;
  const r=Math.floor(i/10),c=i%10;const cells=[];
  if(G.mode==="cross")[[0,0],[-1,0],[1,0],[0,-1],[0,1]].forEach(([dr,dc])=>{if(inB(r+dr,c+dc))cells.push(idx(r+dr,c+dc));});
  else for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++)if(inB(r+dr,c+dc))cells.push(idx(r+dr,c+dc));
  cells.forEach(j=>{const el=document.getElementById("ec"+j);
    if(el){el.classList.add("aoe");pvCells.push(el);}});
}

/* ===== 描画 ===== */
function chargeGauge(p){
  let s='<div class="gauge">';
  for(let i=0;i<MAXCHARGE;i++)s+=`<div class="seg${i<p.charge?" on":""}"></div>`;
  return s+"</div>";
}
function fleetChips(p){
  return '<div class="fleet">'+p.ships.map(s=>{
    const showSunk=s.sunk&&!(G.hideSunk&&[...G.hideSunk].some(si=>p.ships[si]===s));
    return `<span class="fchip${showSunk?" sunk":""}">${s.name}</span>`;}).join("")+"</div>";
}
function statusBar(){
  return '<div class="status">'+G.players.map((p,i)=>`
    <div class="pstat${G.phase!=="place"&&G.current===i?" active":""}">
      <div class="pname"><span>${esc(p.name)}${netActive()&&i===NET.my?"（あなた）":""}</span><span class="chg">⚡${p.charge}/${MAXCHARGE}</span></div>
      ${chargeGauge(p)}${fleetChips(p)}
    </div>`).join("")+"</div>";
}
function plainLabels(){
  return `<div class="corner"></div>
    <div class="clabs">${[...COLS].map(c=>`<div>${c}</div>`).join("")}</div>
    <div class="rlabs">${Array.from({length:10},(_,r)=>`<div>${r+1}</div>`).join("")}</div>`;
}
function fxLayerHTML(){
  const fx=G.fx;let h='<div class="fxlayer">';
  fx.impacts.forEach(f=>{
    const r=Math.floor(f.i/10),c=f.i%10;
    const inner=f.kind==="boom"
      ?`<span class="fx-boom" style="animation-delay:${f.delay}ms"></span>`
      :`<span class="fx-splash" style="animation-delay:${f.delay}ms"></span><span class="fx-splash2" style="animation-delay:${f.delay}ms"></span>`;
    h+=`<div class="fxcell" style="left:${c*10}%;top:${r*10}%;">${inner}</div>`;
  });
  fx.missiles.forEach(f=>{
    const r=Math.floor(f.i/10),c=f.i%10;
    h+=`<div class="fx-missile" style="left:${c*10}%;top:${r*10}%;">
      <svg viewBox="0 0 16 40" style="--md:${(11-r)*100}%;animation-delay:${f.delay}ms" xmlns="http://www.w3.org/2000/svg">
        <path d="M8 0 L13 10 L13 32 L11 36 L14 40 L2 40 L5 36 L3 32 L3 10 Z" fill="#F2C98A" stroke="#E0A458" stroke-width="1"/>
      </svg></div>`;
  });
  fx.planes.forEach(f=>{
    h+=`<div class="fx-plane" style="top:${f.r*10}%;animation-delay:${f.delay}ms">
      <svg viewBox="0 0 60 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M2 12 L34 8 L40 2 L44 2 L42 9 L56 11 L56 13 L42 15 L44 22 L40 22 L34 16 Z" fill="#B7CFE2" stroke="#7B97AE" stroke-width="1"/>
      </svg></div>`;
  });
  fx.torps.forEach(f=>{
    const {edge,n,travel}=f;
    let st="",tx="0%",ty="0%",hcls="";
    if(edge==="t"){st=`left:${n*10}%;top:-10%;`;ty=`${travel*100}%`;}
    if(edge==="b"){st=`left:${n*10}%;top:100%;`;ty=`${-travel*100}%`;}
    if(edge==="l"){st=`top:${n*10}%;left:-10%;`;tx=`${travel*100}%`;hcls=" h";}
    if(edge==="r"){st=`top:${n*10}%;left:100%;`;tx=`${-travel*100}%`;hcls=" h";}
    h+=`<div class="fx-torp${hcls}" style="${st}--tx:${tx};--ty:${ty};--tdur:${travel*TORP_T}ms;animation-delay:${f.delay}ms"><span class="tb"></span></div>`;
  });
  fx.radars.forEach(f=>{
    const r0=Math.max(0,Math.min(7,f.r-1)),c0=Math.max(0,Math.min(7,f.c-1));
    h+=`<div class="fx-radar" style="left:${c0*10}%;top:${r0*10}%;animation-delay:${f.delay}ms"></div>
        <div class="fx-radar" style="left:${c0*10}%;top:${r0*10}%;animation-delay:${f.delay+350}ms"></div>`;
  });
  fx.banners.forEach(b=>{
    h+=`<div class="banner" style="animation-delay:${b.delay}ms">${esc(b.text)}</div>`;
  });
  h+="</div>";
  return h;
}
/* 攻撃画面：敵への攻撃記録のみ（自艦隊は非表示） */
function attackBoard(){
  const atk=G.players[G.current],def=G.players[1-G.current];
  const torp=G.mode==="torpedo"&&!G.turnDone&&!G.busy;
  const canShoot=!G.turnDone&&!G.busy&&G.phase==="battle";
  const hideM=G.hideMarks||new Set(),hideI=G.hideIntel||new Set(),hideS=G.hideSunk||new Set();
  let cells="";
  for(let i=0;i<100;i++){
    const my=def.incoming[i];
    let cls="cell";
    if(my===2&&!hideM.has(i))cls+=" hitbg";
    if(canShoot&&G.mode!=="torpedo"&&(my===0||G.mode==="radar"||G.mode==="airstrike"||G.mode==="cross"))cls+=" clickable";
    cells+=`<div id="ec${i}" class="${cls}" onclick="clickEnemy(${i})" onmouseenter="hoverAoeCell(${i})"></div>`;
  }
  const ships=def.ships.filter((s,si)=>s.sunk&&!hideS.has(si)).map(s=>shipOverlay(s,"ghost")).join("");
  let marks="";
  for(let i=0;i<100;i++){
    const my=def.incoming[i];
    let m="";
    if(!hideM.has(i)){
      if(my===2)m='<span class="mk-hit">✕</span>';
      else if(my===1)m='<span class="mk-miss"></span>';
    }
    if(!m&&my===0&&!hideI.has(i)){
      if(atk.intel[i]===2)m='<span class="mk-iship"></span>';
      else if(atk.intel[i]===1)m='<span class="mk-iempty"></span>';
    }
    marks+=`<div class="mcell">${m}</div>`;
  }
  const strips=torp
    ?`<div class="strip b">${Array.from({length:10},(_,c)=>`<button class="tarrow" onclick="fireTorpedo('b',${c})">▲</button>`).join("")}</div>
      <div class="strip r">${Array.from({length:10},(_,r)=>`<button class="tarrow" onclick="fireTorpedo('r',${r})">◀</button>`).join("")}</div>`
    :"";
  const clabs=torp
    ?`<div class="clabs">${Array.from({length:10},(_,c)=>`<button class="tarrow" onclick="fireTorpedo('t',${c})">▼</button>`).join("")}</div>`
    :`<div class="clabs">${[...COLS].map(c=>`<div>${c}</div>`).join("")}</div>`;
  const rlabs=torp
    ?`<div class="rlabs">${Array.from({length:10},(_,r)=>`<button class="tarrow" onclick="fireTorpedo('l',${r})">▶</button>`).join("")}</div>`
    :`<div class="rlabs">${Array.from({length:10},(_,r)=>`<div>${r+1}</div>`).join("")}</div>`;
  const shake=G.fx.shakeDelay>=0?` shake" style="--shd:${G.fx.shakeDelay}ms`:"";
  return `<div class="board${torp?" pad-tr pad-b":""}">
    <div class="corner"></div>${clabs}${rlabs}
    <div class="sea${shake}" onmouseleave="clearPv()">
      <div class="layer cells">${cells}</div>
      <div class="layer shipsL">${ships}</div>
      <div class="layer marks">${marks}</div>
      ${fxLayerHTML()}
      ${strips}
    </div></div>`;
}
/* リプレイ画面：自艦隊＋敵攻撃の再生 */
function replayBoard(){
  const me=G.players[netActive()?NET.my:G.current];
  const hideM=G.hideMarks||new Set(),hideS=G.hideSunk||new Set();
  let cells="";
  for(let i=0;i<100;i++)cells+=`<div class="cell"></div>`;
  const ships=me.ships.map((s,si)=>{
    const v=s.sunk&&!hideS.has(si)?"mineSunk":"mine";
    return shipOverlay(s,v);}).join("");
  let zones="";
  (G.replayRadarZones||[]).forEach(z=>{
    const r0=Math.max(0,Math.min(7,z.r-1)),c0=Math.max(0,Math.min(7,z.c-1));
    zones+=`<div class="rzone" style="left:${c0*10}%;top:${r0*10}%;width:30%;height:30%;"></div>`;
  });
  let marks="";
  for(let i=0;i<100;i++){
    const en=me.incoming[i];
    let m="";
    if(!hideM.has(i)){
      if(en===2)m='<span class="mk-flame">🔥</span>';
      else if(en===1)m='<span class="mk-ediamond"></span>';
    }
    marks+=`<div class="mcell">${m}</div>`;
  }
  const shake=G.fx.shakeDelay>=0?` shake" style="--shd:${G.fx.shakeDelay}ms`:"";
  return `<div class="board">${plainLabels()}
    <div class="sea${shake}">
      <div class="layer cells">${cells}</div>
      <div class="layer shipsL">${ships}</div>
      <div class="layer marks" style="z-index:2">${zones}${marks}</div>
      ${fxLayerHTML()}
    </div></div>`;
}
function placeBoard(p){
  let cells="";
  for(let i=0;i<100;i++){
    cells+=`<div id="oc${i}" class="cell clickable" onclick="clickPlace(${i})" onmouseenter="hoverPlaceCell(${i})"></div>`;
  }
  const ships=p.ships.map(s=>shipOverlay(s,"mine")).join("");
  return `<div class="board">${plainLabels()}
    <div class="sea" onmouseleave="clearPv()">
      <div class="layer cells">${cells}</div>
      <div class="layer shipsL">${ships}</div>
    </div></div>`;
}
function specialsPanel(){
  const atk=G.players[G.current];
  return '<div class="specials">'+SPECIALS.map(sp=>{
    const ship=atk.ships[sp.ship];
    const dead=ship.sunk;
    const armed=G.mode===sp.key;
    const dis=G.turnDone||G.busy||dead||atk.charge<sp.cost||(sp.key==="rapid"&&G.rapidActive);
    return `<button class="spbtn${armed?" armed":""}${dead?" dead":""}" ${dis&&!armed?"disabled":""}
      onclick="toggleSpecial('${sp.key}')">
      <div class="spname"><span>${sp.name}</span><span class="spcost">${dead?"撃沈":"⚡"+sp.cost}</span></div>
      <div class="spdesc">${ship.name}／${sp.desc}</div></button>`;
  }).join("")+"</div>";
}
function render(){
  if(netApplying())return; // 相手操作の適用中は描画しない（リプレイで一括再生）
  const app=document.getElementById("app");
  pvCells=[];
  if(G.overlay){renderOverlay(app);return;}
  if(G.screen==="waiting"&&netActive()){renderWaiting(app);return;}
  if(G.phase==="place"){renderPlace(app);return;}
  if(G.screen==="replay"&&(G.phase!=="over"||netActive())){renderReplay(app);return;}
  renderBattle(app);
}
function renderWaiting(app){
  const placing=G.phase==="place";
  app.innerHTML=`
    <h1>艦隊決戦</h1><div class="sub">ONLINE BATTLE</div>
    ${placing?"":statusBar()}
    <div class="waitwrap">
      <div class="sweep"></div>
      <div class="ovtitle">${placing?"配置待機":"敵手番"}</div>
      <div class="ovtext">${placing?"相手の艦隊配置を待っています…":"相手が攻撃中です。<br>相手の手番が終わると被害リプレイが再生されます。"}
      <small>対戦相手：${esc(NET.theirName||"接続中…")}／通信が切れた場合はページを再読み込みしてください。</small></div>
    </div>`;
}
function renderPlace(app){
  const p=G.players[G.current];
  const done=G.placeIdx>=5;
  app.innerHTML=`
    <h1>艦隊決戦</h1><div class="sub">FLEET BATTLE</div>
    <div class="msg"><b>${esc(p.name)}</b>：${done?"配置完了。確認して出撃してください。":`${SHIPS[G.placeIdx].name}（${SHIPS[G.placeIdx].size}マス）を配置 — マスをタップ`}</div>
    <div class="shipqueue">${SHIPS.map((s,i)=>`<span class="sq${i<G.placeIdx?" done":i===G.placeIdx?" cur":""}">${s.name}(${s.size})</span>`).join("")}</div>
    <div class="btnrow">
      <button class="btn ghost" onclick="G.dir=G.dir==='h'?'v':'h';render()">向き：${G.dir==="h"?"横 →":"縦 ↓"}</button>
      <button class="btn ghost" onclick="randomPlace(G.players[G.current]);render()">ランダム配置</button>
      <button class="btn ghost" onclick="clearPlacement(G.players[G.current]);render()">やり直し</button>
    </div>
    ${placeBoard(p)}
    <div class="btnrow" style="justify-content:center;margin-top:14px;">
      <button class="btn" ${done?"":"disabled"} onclick="donePlacement()">${netActive()?"配置を確定して出撃":`配置を確定して${G.current===0?"交代":"開戦"}`}</button>
    </div>`;
}
function renderReplay(app){
  const me=G.players[netActive()?NET.my:G.current];
  app.innerHTML=`
    <h1>艦隊決戦</h1><div class="sub">FLEET BATTLE</div>
    ${statusBar()}
    <div class="msg"><span><b>${esc(me.name)}</b>｜${G.msg}</span></div>
    <div class="boardlabel"><span>自艦隊</span><span class="note">🔥被弾　◇着水　▢索敵範囲</span></div>
    ${replayBoard()}
    <div class="spacer-bottom"></div>
    <div class="centeraction">
      <button class="btn" onclick="toAttackScreen()">${G.phase==="over"?(G.busy?"スキップ ▶ 結果へ":"結果を確認 ▶"):(G.busy?"スキップ ▶ 攻撃へ":"攻撃へ進む ▶")}</button>
    </div>`;
}
function renderBattle(app){
  const atk=G.players[G.current],def=G.players[1-G.current];
  const targeting=(["airstrike","cross","radar","torpedo"].includes(G.mode)||(G.mode==="rapid"&&!G.rapidFired))&&!G.turnDone&&!G.busy;
  const over=G.phase==="over";
  const showHandover=G.turnDone&&!over&&!G.busy;
  app.innerHTML=`
    <h1>艦隊決戦</h1><div class="sub">FLEET BATTLE</div>
    ${statusBar()}
    <div class="msg"><span><b>${esc(atk.name)}</b>の手番｜${G.msg}</span>
      ${targeting?`<button class="btn ghost small" onclick="cancelSpecial()">キャンセル</button>`:""}</div>
    ${specialsPanel()}
    <div class="boardlabel"><span>敵海域</span><span class="note">✕命中　●外れ　◯索敵:艦あり</span></div>
    ${attackBoard()}
    ${showHandover?`<div class="spacer-bottom"></div>
      <div class="centeraction"><button class="btn" onclick="${netActive()?"netEndTurn()":"startHandover()"}">${netActive()?"手番を終了 ▶":`交代する ▶ ${esc(def.name)}`}</button></div>`:""}
    ${over&&!G.busy?gameoverOverlay():""}`;
}
function gameoverOverlay(){
  const w=G.players[G.current],l=G.players[1-G.current];
  const title=netActive()?(G.current===NET.my?"勝利！":"敗北…"):`${esc(w.name)} の勝利`;
  const btn=netActive()
    ?`<button class="btn" onclick="location.reload()">新しい対戦へ</button>`
    :`<button class="btn" onclick="initGame()">もう一度戦う</button>`;
  return `<div class="overlay translucent">
    <div class="ovtitle">${title}</div>
    <div class="ovtext">${esc(w.name)}が${esc(l.name)}の艦隊を全滅させた。<small>勝者の残存艦：${w.ships.filter(s=>!s.sunk).map(s=>s.name).join("・")||"なし"}</small></div>
    ${btn}</div>`;
}
function renderOverlay(app){
  if(G.overlay==="intro"){
    app.innerHTML=`<div class="overlay">
      <div class="sweep"></div>
      <div class="ovtitle">艦隊決戦</div>
      <div class="rules">
        <b>基本</b>：10×10に5隻を配置し、交互に砲撃。先に敵艦隊を全滅させたら勝ち。<br>
        <b>画面構成</b>：ターン開始時に自艦隊への被害リプレイを確認し、その後攻撃画面へ。攻撃画面には自艦隊は表示されない。<br>
        <b>連続ターン</b>：通常砲撃（ミサイル）が命中したら続けてもう一発。外すまで撃てる。<br>
        <b>チャージ⚡</b>：命中+1、撃沈+1、被弾+1、手番開始時+1（2巡目以降）。上限10。<br>
        <b>特殊攻撃</b>：チャージ消費で発動。対応する自艦が沈むと使用不可。特殊攻撃ではチャージは貯まらず、使用後はターン終了。<br>
        <b>魚雷</b>：直線を進み最初の艦に命中。通過した空マスは着弾記録として残る。
      </div>
      <button class="btn" onclick="G.overlay=null;render()">ローカル対戦（1台で交互プレイ）</button>
      <button class="btn ghost" onclick="G.overlay='netsetup';render()">オンライン対戦（2台で接続）</button>
    </div>`;return;
  }
  if(G.overlay==="netsetup"){
    app.innerHTML=`<div class="overlay">
      <div class="ovtitle">オンライン対戦</div>
      <input class="txtin" id="nm" maxlength="12" placeholder="あなたの名前（任意）">
      <button class="btn" onclick="createRoom()">部屋を作る（先攻・ホスト）</button>
      <div class="ovtext" style="color:var(--dim);font-size:.8rem;">— または —</div>
      <input class="txtin" id="jcode" maxlength="4" placeholder="部屋コード（4文字）" style="text-transform:uppercase;letter-spacing:.2em;">
      <button class="btn" onclick="joinRoom()">部屋に参加（後攻）</button>
      <div class="neterr" id="neterr"></div>
      <button class="btn ghost small" onclick="G.overlay='intro';render()">◀ 戻る</button>
    </div>`;return;
  }
  if(G.overlay==="nethost"){
    app.innerHTML=`<div class="overlay">
      <div class="sweep"></div>
      <div class="ovtitle">部屋コード</div>
      <div class="codebig">${NET.code}</div>
      <button class="btn ghost small" onclick="navigator.clipboard&&navigator.clipboard.writeText(NET.code)">コードをコピー</button>
      <div class="ovtext">相手の参加を待っています…<small>相手にこのHTMLを開いてもらい、「部屋に参加」で上のコードを入力してもらってください。</small></div>
      <button class="btn ghost small" onclick="location.reload()">◀ 中止</button>
    </div>`;return;
  }
  if(G.overlay==="netjoin"){
    app.innerHTML=`<div class="overlay">
      <div class="sweep"></div>
      <div class="ovtitle">接続中…</div>
      <div class="ovtext">部屋 <b style="color:var(--brass)">${NET.code}</b> に接続しています…</div>
      <button class="btn ghost small" onclick="location.reload()">◀ 中止</button>
    </div>`;return;
  }
  if(G.overlay==="netfail"){
    app.innerHTML=`<div class="overlay">
      <div class="ovtitle">通信エラー</div>
      <div class="ovtext">${esc(G.failMsg||"接続に問題が発生しました。")}</div>
      <button class="btn" onclick="location.reload()">最初からやり直す</button>
    </div>`;return;
  }
  if(G.overlay==="pass"){
    app.innerHTML=`<div class="overlay">
      <div class="sweep"></div>
      <div class="ovtitle">通信封鎖中</div>
      <div class="ovtext">端末を <b style="color:var(--brass)">${esc(G.players[G.passTo].name)}</b> に渡してください。<small>相手は画面を見ないこと。</small></div>
      <button class="btn" onclick="const f=G.afterPass;G.overlay=null;if(f)f();render()">${esc(G.players[G.passTo].name)} 準備OK</button>
    </div>`;return;
  }
}
document.addEventListener("keydown",e=>{
  if(e.key==="r"&&G&&G.phase==="place"&&!G.overlay){G.dir=G.dir==="h"?"v":"h";render();}
});
initGame();
</script>
